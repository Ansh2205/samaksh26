<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAMAKSH 2026 - Ticket Verifier</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- HTML5 QR Code Scanner -->
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <!-- Inter Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f9fafb; }
        .theme-transition { transition: all 300ms cubic-bezier(0.4, 0, 0.2, 1); }
        
        /* QR Scanner Custom Overrides */
        #reader {
            border: none !important;
            border-radius: 1rem;
            overflow: hidden;
            background: #f8fafc;
        }
        #reader__dashboard_section_csr span { color: #dc2626 !important; font-weight: 800; }
        #reader__dashboard_section_swaplink { text-decoration: none !important; color: #4f46e5 !important; font-weight: 700; }
        #reader button {
            background-color: #111827; color: white; border: none;
            padding: 10px 20px; border-radius: 0.75rem; font-weight: 700; cursor: pointer; margin-top: 12px; transition: all 0.2s;
        }
        #reader button:hover { background-color: #000; transform: scale(0.98); }
    </style>
</head>

<body class="text-gray-800 min-h-screen flex flex-col selection:bg-red-100 selection:text-red-900">
    <!-- Header -->
    <header class="bg-white/90 backdrop-blur-md sticky top-0 z-50 border-b border-gray-200 shadow-sm relative">
        <div class="container mx-auto flex flex-wrap py-4 px-6 md:flex-row items-center font-semibold justify-between">
            <a class="flex title-font font-bold items-center text-gray-900 mb-0 group hover:opacity-80 transition-opacity">
                <img src="image_60255d.jpg" alt="SAMAKSH Logo" class="h-10 w-auto rounded">
                <span class="ml-3 text-2xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-red-600 to-red-800 tracking-tight">Access Control</span>
            </a>
            <div class="flex items-center space-x-4 mt-4 md:mt-0">
                <a href="admin.html" class="text-sm font-bold text-gray-600 hover:text-red-700 py-2 px-5 rounded-full border border-gray-200 hover:bg-gray-50 transition-colors shadow-sm">Admin Dashboard</a>
            </div>
        </div>
    </header>

    <main class="flex-grow container mx-auto max-w-3xl px-4 py-10">
        
        <!-- Setup Controls (Day & Mode) -->
        <div class="bg-white rounded-3xl shadow-xl shadow-red-900/5 border border-gray-100 p-6 mb-10 grid grid-cols-1 md:grid-cols-2 gap-6">
            
            <!-- Day Switcher -->
            <div class="flex flex-col space-y-3">
                <label class="text-xs font-extrabold text-gray-400 uppercase tracking-widest pl-1">Select Event Day</label>
                <div class="flex bg-gray-50 p-1.5 rounded-xl border border-gray-200 shadow-inner">
                    <button id="day1-btn" class="flex-1 px-4 py-2.5 rounded-lg text-sm font-bold shadow-sm bg-white text-red-700 transition-all">Day 1</button>
                    <button id="day2-btn" class="flex-1 px-4 py-2.5 rounded-lg text-sm font-bold text-gray-500 hover:text-gray-900 transition-all bg-transparent">Day 2</button>
                </div>
            </div>

            <!-- Mode Switcher -->
            <div class="flex flex-col space-y-3">
                <label class="text-xs font-extrabold text-gray-400 uppercase tracking-widest pl-1">Select Check-in Mode</label>
                <div class="flex bg-gray-50 p-1.5 rounded-xl border border-gray-200 shadow-inner">
                    <button id="mode-event-btn" class="flex-1 px-4 py-2.5 rounded-lg text-sm font-bold shadow-sm bg-white text-red-600 transition-all">Fest Entry</button>
                    <button id="mode-lunch-btn" class="flex-1 px-4 py-2.5 rounded-lg text-sm font-bold text-gray-500 hover:text-gray-900 transition-all bg-transparent">Lunch Mode</button>
                </div>
            </div>

        </div>

        <div class="grid grid-cols-1 gap-8">
            <!-- Scanner Card -->
            <div class="bg-white rounded-3xl shadow-xl shadow-red-900/5 border border-gray-100 overflow-hidden">
                <div class="bg-gradient-to-r from-red-600 to-red-700 px-8 py-5 flex justify-between items-center transition-all duration-300" id="scanner-header">
                    <h2 class="text-xl font-extrabold text-white flex items-center tracking-tight">
                        <svg class="w-6 h-6 mr-3 opacity-90" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm14 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"></path></svg>
                        <span id="scanner-title">Scan Day 1 Fest Pass</span>
                    </h2>
                </div>
                <div class="p-8">
                    <!-- The QR Scanner Window -->
                    <div id="reader" class="w-full border-2 border-dashed border-gray-200 rounded-2xl p-2"></div>
                    
                    <div class="mt-8">
                        <div class="relative">
                            <div class="absolute inset-0 flex items-center" aria-hidden="true"><div class="w-full border-t border-gray-200"></div></div>
                            <div class="relative flex justify-center"><span class="bg-white px-4 text-xs font-bold text-gray-400 tracking-widest uppercase">OR MANUAL ENTRY</span></div>
                        </div>
                        
                        <form id="manual-form" class="mt-6 flex space-x-3">
                            <input type="text" id="manual-code" placeholder="Enter SMK26-XXXX" required class="block w-full rounded-xl border-gray-300 shadow-sm focus:border-red-500 focus:ring-red-500 sm:text-sm p-4 border uppercase bg-gray-50 font-mono tracking-widest font-bold">
                            <button type="submit" class="inline-flex justify-center items-center rounded-xl border border-transparent bg-gray-900 py-4 px-8 text-sm font-bold text-white shadow-md hover:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-gray-900 focus:ring-offset-2 transition-transform active:scale-[0.98]">
                                Verify
                            </button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Result Card (Hidden by default) -->
            <div id="result-card" class="hidden rounded-3xl shadow-2xl border-0 overflow-hidden transition-all duration-300 transform scale-95 opacity-0">
                <div id="result-header" class="px-8 py-5 flex items-center justify-between shadow-sm relative z-10">
                    <h3 id="result-status-title" class="text-2xl font-extrabold text-white tracking-tight">Status</h3>
                    <div id="result-icon" class="text-white drop-shadow-md"></div>
                </div>
                
                <div class="p-8 bg-white relative">
                    <div class="grid grid-cols-2 gap-6 mb-8 relative z-10">
                        <div>
                            <p class="text-xs text-gray-400 uppercase font-extrabold tracking-widest mb-1">Attendee</p>
                            <p class="text-xl font-extrabold text-gray-900 line-clamp-1" id="res-name">-</p>
                        </div>
                        <div>
                            <p class="text-xs text-gray-400 uppercase font-extrabold tracking-widest mb-1">Entry Code</p>
                            <p class="text-xl font-mono font-extrabold text-red-600 bg-red-50 inline-block px-2 py-0.5 rounded" id="res-code">-</p>
                        </div>
                        <div class="col-span-2">
                            <p class="text-xs text-gray-400 uppercase font-extrabold tracking-widest mb-1">Pass Detail</p>
                            <p class="text-lg font-bold text-gray-800" id="res-event">-</p>
                        </div>
                        <div class="col-span-2 p-4 rounded-xl bg-gray-50 border border-gray-200 shadow-inner">
                            <p class="text-sm font-bold text-gray-700 text-center" id="res-message">-</p>
                        </div>
                    </div>

                    <!-- Action Buttons -->
                    <div id="action-container" class="hidden border-t border-gray-100 pt-6 flex space-x-3 relative z-10">
                        <button id="mark-used-btn" class="flex-1 bg-gradient-to-r from-green-600 to-green-700 text-white font-extrabold py-4 px-4 rounded-xl hover:from-green-700 hover:to-green-800 shadow-lg shadow-green-900/20 transition-transform active:scale-[0.98] flex justify-center items-center">
                            <span id="btn-text" class="tracking-wide">Grant Access</span>
                        </button>
                    </div>
                    
                    <button id="close-result-btn" class="w-full mt-4 bg-white text-gray-800 border-2 border-gray-200 font-bold py-4 px-4 rounded-xl hover:bg-gray-50 transition-colors relative z-10">
                        Close & Scan Next
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const API_BASE_URL = ''; 
            let html5QrcodeScanner = null;
            let currentMode = 'event'; // 'event' or 'lunch'
            let currentDay = 'day1';   // 'day1' or 'day2'
            let currentlyScannedCode = null;

            // Elements
            const modeEventBtn = document.getElementById('mode-event-btn');
            const modeLunchBtn = document.getElementById('mode-lunch-btn');
            const day1Btn = document.getElementById('day1-btn');
            const day2Btn = document.getElementById('day2-btn');
            
            const scannerHeader = document.getElementById('scanner-header');
            const scannerTitle = document.getElementById('scanner-title');
            
            const manualForm = document.getElementById('manual-form');
            const manualInput = document.getElementById('manual-code');
            
            const resultCard = document.getElementById('result-card');
            const resultHeader = document.getElementById('result-header');
            const resultStatusTitle = document.getElementById('result-status-title');
            const resultIcon = document.getElementById('result-icon');
            
            const resName = document.getElementById('res-name');
            const resCode = document.getElementById('res-code');
            const resEvent = document.getElementById('res-event');
            const resMessage = document.getElementById('res-message');
            
            const actionContainer = document.getElementById('action-container');
            const markUsedBtn = document.getElementById('mark-used-btn');
            const btnText = document.getElementById('btn-text');
            const closeResultBtn = document.getElementById('close-result-btn');

            // --- UI Switchers ---
            function updateUI() {
                // Day UI
                if (currentDay === 'day1') {
                    day1Btn.className = 'flex-1 px-4 py-2.5 rounded-lg text-sm font-bold shadow-sm bg-white text-red-700 transition-all';
                    day2Btn.className = 'flex-1 px-4 py-2.5 rounded-lg text-sm font-bold text-gray-500 hover:text-gray-900 transition-all bg-transparent shadow-none';
                } else {
                    day2Btn.className = 'flex-1 px-4 py-2.5 rounded-lg text-sm font-bold shadow-sm bg-white text-red-700 transition-all';
                    day1Btn.className = 'flex-1 px-4 py-2.5 rounded-lg text-sm font-bold text-gray-500 hover:text-gray-900 transition-all bg-transparent shadow-none';
                }

                // Mode UI & Headers
                const dayLabel = currentDay === 'day1' ? 'Day 1' : 'Day 2';
                if (currentMode === 'event') {
                    modeEventBtn.className = 'flex-1 px-4 py-2.5 rounded-lg text-sm font-bold shadow-sm bg-white text-red-600 transition-all';
                    modeLunchBtn.className = 'flex-1 px-4 py-2.5 rounded-lg text-sm font-bold text-gray-500 hover:text-gray-900 transition-all bg-transparent shadow-none';
                    
                    scannerHeader.className = 'bg-gradient-to-r from-red-600 to-red-700 px-8 py-5 flex justify-between items-center transition-all duration-300';
                    scannerTitle.textContent = `Scan ${dayLabel} Fest Pass`;
                    btnText.textContent = `Grant ${dayLabel} Access`;
                } else {
                    modeLunchBtn.className = 'flex-1 px-4 py-2.5 rounded-lg text-sm font-bold shadow-sm bg-white text-orange-600 transition-all';
                    modeEventBtn.className = 'flex-1 px-4 py-2.5 rounded-lg text-sm font-bold text-gray-500 hover:text-gray-900 transition-all bg-transparent shadow-none';
                    
                    scannerHeader.className = 'bg-gradient-to-r from-orange-500 to-amber-500 px-8 py-5 flex justify-between items-center transition-all duration-300';
                    scannerTitle.textContent = `Scan ${dayLabel} Lunch Coupon`;
                    btnText.textContent = `Grant ${dayLabel} Lunch`;
                }
                hideResult();
            }

            day1Btn.addEventListener('click', () => { currentDay = 'day1'; updateUI(); });
            day2Btn.addEventListener('click', () => { currentDay = 'day2'; updateUI(); });
            modeEventBtn.addEventListener('click', () => { currentMode = 'event'; updateUI(); });
            modeLunchBtn.addEventListener('click', () => { currentMode = 'lunch'; updateUI(); });

            updateUI();

            // --- Scanner Setup ---
            function onScanSuccess(decodedText, decodedResult) {
                if (html5QrcodeScanner) html5QrcodeScanner.pause(true);
                processCode(decodedText);
            }

            html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: {width: 250, height: 250} }, false);
            html5QrcodeScanner.render(onScanSuccess, undefined);

            manualForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const code = manualInput.value.trim().toUpperCase();
                if (code) {
                    if (html5QrcodeScanner) html5QrcodeScanner.pause(true);
                    processCode(code);
                }
            });

            // --- Verification Logic ---
            async function processCode(code) {
                currentlyScannedCode = code;
                manualInput.value = '';
                
                try {
                    const response = await fetch(`${API_BASE_URL}/verify-ticket`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ entryCode: code, mode: currentMode, day: currentDay }) 
                    });
                    
                    const data = await response.json();
                    showResult(data);
                } catch (error) {
                    showResult({ status: 'ERROR', message: 'Network error. Could not connect to server.' });
                }
            }

            function showResult(data) {
                resultCard.classList.remove('hidden');
                setTimeout(() => {
                    resultCard.classList.remove('scale-95', 'opacity-0');
                    resultCard.classList.add('scale-100', 'opacity-100');
                }, 10);

                resCode.textContent = currentlyScannedCode;
                resMessage.textContent = data.message;
                
                if (data.ticket) {
                    resName.textContent = data.ticket.name || (data.ticket.organization ? data.ticket.organization.contactPerson : 'Unknown');
                    resEvent.textContent = data.ticket.eventName || "Fest Pass";
                } else {
                    resName.textContent = '-';
                    resEvent.textContent = '-';
                }

                actionContainer.classList.add('hidden');
                resultHeader.className = 'px-8 py-5 flex items-center justify-between shadow-sm relative z-10 transition-all'; 

                const iconSuccess = `<svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>`;
                const iconWarning = `<svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>`;
                const iconError = `<svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>`;

                if (data.status === 'VALID') {
                    resultHeader.classList.add('bg-gradient-to-r', 'from-green-500', 'to-emerald-600');
                    resultStatusTitle.textContent = 'ACCESS GRANTED';
                    resultIcon.innerHTML = iconSuccess;
                    actionContainer.classList.remove('hidden'); 
                } 
                else if (data.status === 'USED') {
                    resultHeader.classList.add('bg-gradient-to-r', 'from-amber-400', 'to-yellow-500');
                    resultStatusTitle.textContent = 'ALREADY CLAIMED';
                    resultIcon.innerHTML = iconWarning;
                }
                else if (data.status === 'PENDING_PAYMENT') {
                    resultHeader.classList.add('bg-gradient-to-r', 'from-red-500', 'to-rose-600');
                    resultStatusTitle.textContent = 'PAYMENT PENDING';
                    resultIcon.innerHTML = iconWarning;
                }
                else {
                    resultHeader.classList.add('bg-gradient-to-r', 'from-gray-700', 'to-gray-900');
                    resultStatusTitle.textContent = 'INVALID TICKET';
                    resultIcon.innerHTML = iconError;
                }

                resultCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }

            function hideResult() {
                resultCard.classList.remove('scale-100', 'opacity-100');
                resultCard.classList.add('scale-95', 'opacity-0');
                setTimeout(() => {
                    resultCard.classList.add('hidden');
                    if (html5QrcodeScanner) {
                        try { html5QrcodeScanner.resume(); } catch(e) {}
                    }
                }, 300);
            }

            closeResultBtn.addEventListener('click', hideResult);

            // --- Mark as Used Logic ---
            markUsedBtn.addEventListener('click', async () => {
                const originalText = btnText.textContent;
                btnText.textContent = 'Processing...';
                markUsedBtn.disabled = true;

                try {
                    const response = await fetch(`${API_BASE_URL}/mark-ticket-used`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ entryCode: currentlyScannedCode, mode: currentMode, day: currentDay })
                    });
                    
                    const data = await response.json();
                    
                    if (data.status === 'USED_SUCCESS') {
                        resultHeader.className = 'px-8 py-5 flex items-center justify-between shadow-sm relative z-10 transition-all bg-gradient-to-r from-blue-600 to-indigo-600';
                        resultStatusTitle.textContent = 'SUCCESSFULLY LOGGED';
                        resMessage.textContent = `${currentDay === 'day1' ? 'Day 1' : 'Day 2'} ${currentMode === 'event' ? 'Access' : 'Lunch'} granted!`;
                        actionContainer.classList.add('hidden');
                        
                        setTimeout(hideResult, 2000);
                    } else {
                        alert('Error: ' + data.message);
                    }
                } catch (error) {
                    alert('Network error while marking ticket.');
                } finally {
                    btnText.textContent = originalText;
                    markUsedBtn.disabled = false;
                }
            });
        });
    </script>
</body>
</html>
